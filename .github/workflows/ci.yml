name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test tools
        run: python -m pip install --upgrade pip pytest ruff
      - name: Ruff
        run: ruff check .
      - name: Compile
        run: python -m compileall -q src tests
      - name: Tests
        run: python -m pytest -q
      - name: CLI smoke
        run: |
          PYTHONPATH=src python -m ticker_due_diligence.cli \
            --input examples/rdw.json \
            --financials examples/rdw-financials.csv \
            --output /tmp/RDW-note.md \
            --format json
          test -s /tmp/RDW-note.md
          PYTHONPATH=src python -m ticker_due_diligence.cli \
            --input examples/rdw.json \
            --financials examples/rdw-financials.csv \
            --validate-only
